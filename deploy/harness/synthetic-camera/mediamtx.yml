# Synthetic RTSP camera for CI/dev: mediamtx serves an H.264 test pattern
# (testsrc2, which carries a moving timecode) plus a known 1 kHz sine audio track
# on rtsp://<host>:8554/cam. Contract-conformant: H.264 baseline, 720p, 15 fps.
logLevel: info
rtspAddress: :8554
# Nothing else is needed for the harness.
rtmp: no
hls: no
webrtc: no
srt: no
api: no
metrics: no
pprof: no
playback: no

paths:
  cam:
    # Publish the test source into this path when the server starts, and restart
    # ffmpeg if it ever exits (keeps the stream continuously available).
    runOnInit: >
      ffmpeg -re
      -f lavfi -i testsrc2=size=1280x720:rate=15
      -f lavfi -i sine=frequency=1000:sample_rate=16000
      -c:v libx264 -profile:v baseline -pix_fmt yuv420p -g 15 -tune zerolatency
      -c:a aac -ar 16000 -ac 1
      -f rtsp -rtsp_transport tcp rtsp://localhost:8554/cam
    runOnInitRestart: yes

  # Motion-onset source for the insight motion pipeline (M2.2): a still gray field
  # with testsrc2 motion overlaid for 4s of every 8s cycle. The still<->moving
  # boundary is a real motion onset; because the 8s cycle repeats forever, an onset
  # is guaranteed inside any observation window regardless of when insight connects.
  # No audio track (has_audio=False -> motion-only extractor).
  cam-motion:
    runOnInit: >
      ffmpeg -re
      -f lavfi -i color=c=gray:s=1280x720:r=15
      -f lavfi -i testsrc2=size=1280x720:rate=15
      -filter_complex "[0:v][1:v]overlay=enable='lt(mod(t,8),4)'[v]"
      -map "[v]"
      -c:v libx264 -profile:v baseline -pix_fmt yuv420p -g 15 -tune zerolatency
      -f rtsp -rtsp_transport tcp rtsp://localhost:8554/cam-motion
    runOnInitRestart: yes

  # A video-only source (no audio track) for the graceful-degradation check: the
  # engine must run and derive motion with the audio branch absent.
  cam-noaudio:
    runOnInit: >
      ffmpeg -re
      -f lavfi -i testsrc2=size=1280x720:rate=15
      -an
      -c:v libx264 -profile:v baseline -pix_fmt yuv420p -g 15 -tune zerolatency
      -f rtsp -rtsp_transport tcp rtsp://localhost:8554/cam-noaudio
    runOnInitRestart: yes

  # An H.265/HEVC source, used only to prove the RTSP contract rejects non-H.264.
  cam-h265:
    runOnInit: >
      ffmpeg -re
      -f lavfi -i testsrc2=size=640x480:rate=15
      -c:v libx265 -preset ultrafast -pix_fmt yuv420p -g 30
      -f rtsp -rtsp_transport tcp rtsp://localhost:8554/cam-h265
    runOnInitRestart: yes
