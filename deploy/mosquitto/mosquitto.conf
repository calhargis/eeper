# Main-stack MQTT broker for the insight-engine's movement-level events (M2.2).
#
# Anonymous + plaintext is acceptable here ONLY because the broker is internal-
# network-only: it has no host port and lives on the isolated `internal` docker
# network (the same trust boundary as the database). Nothing outside the compose
# project can reach it. The hardened broker — TLS, per-device credentials, and
# topic-scoped ACLs for external sensor nodes — lands in M3.1, when the MQTT bus is
# first exposed to hardware.
listener 1883 0.0.0.0
allow_anonymous true
persistence false
log_dest stdout
