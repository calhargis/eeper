# Hardened MQTT broker (M3.1). TLS-only, per-client credentials, and topic-scoped
# ACLs via mosquitto's dynamic-security plugin. There is NO anonymous access and NO
# plaintext listener — a plaintext connection attempt is simply refused (nothing
# listens on 1883). The insight engine authenticates as `insight-publisher` (may only
# publish eeper/insight/#); sensor nodes get their own per-device account, minted at
# pair time and scoped to eeper/dev/{id}/#, so one device can never read or write
# another device's — or the internal insight — topics.
#
# The TLS material (mqtt-ca.crt + broker.crt/.key) and the dynamic-security seed are
# generated once by deploy/gen-mqtt-security.sh (invoked by install.sh) and mounted in.
listener 8883 0.0.0.0
cafile /mosquitto/certs/mqtt-ca.crt
certfile /mosquitto/certs/broker.crt
keyfile /mosquitto/certs/broker.key

allow_anonymous false
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json

persistence false
log_dest stdout
