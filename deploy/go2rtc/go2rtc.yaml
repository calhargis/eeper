# go2rtc for eeper — the media gateway. Streams are registered dynamically by the
# api over the REST API (this file is a seed, copied onto a writable tmpfs at
# start). Internal-only: no ports are published; the api relays WebRTC signaling
# and clients never reach go2rtc directly.
log:
  level: info

api:
  listen: ':1984' # internal REST + WebRTC signaling relay target; never published

rtsp:
  listen: ':8554' # internal RTSP re-serve for downstream consumers (recorder, insight-engine)

webrtc:
  listen: ':8555' # fixed TCP+UDP media transport; port 8555 is published on the host
  # Advertise browser-reachable ICE candidates. go2rtc hardcode-excludes its own
  # Docker-bridge (172.16/12) address, so auto-discovery alone yields no candidate a
  # client can route to. EEPER_GO2RTC_CANDIDATE is the host address the browser
  # reaches (127.0.0.1 for local/CI; the host LAN IP for a real install — set by
  # install.sh). EEPER_GO2RTC_CANDIDATE_ALT is an optional SECOND address for clients
  # that reach the host by a different route — e.g. a Tailscale/VPN IP — so off-LAN
  # viewers get a candidate they can actually connect to (otherwise WebRTC media fails
  # from off-LAN even though signaling over the tunnel works). It defaults to the primary
  # candidate (a harmless duplicate) when unset, so single-network installs are unchanged.
  # Signaling still flows only through the authenticated api relay.
  candidates:
    - ${EEPER_GO2RTC_CANDIDATE:127.0.0.1}:8555
    - ${EEPER_GO2RTC_CANDIDATE_ALT:127.0.0.1}:8555
  # No public STUN: self-hosted, no internet egress, and it would leak the host IP.
  ice_servers: []
