name: eeper

# Shared hardening applied to every container: no privilege escalation, all
# Linux capabilities dropped, and a read-only root filesystem. Writable paths
# are explicit (named volumes for data, tmpfs for scratch).
x-hardening: &hardening
  restart: unless-stopped
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  db:
    <<: *hardening
    image: timescale/timescaledb:latest-pg16@sha256:ba149561ad4ddff5940d6eb0a0df60aefd1355cee1a450928f271267038fc888
    profiles: [core]
    # Run as the image's postgres user (uid 70). A fresh named volume inherits
    # the image's postgres-owned PGDATA, so initdb works on a read-only rootfs.
    user: '70:70'
    environment:
      POSTGRES_USER: eeper
      POSTGRES_DB: eeper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run deploy/install.sh}
    volumes:
      - db-data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /run/postgresql
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eeper -d eeper -h 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  api:
    <<: *hardening
    build:
      context: ../server
    image: eeper-api:dev
    profiles: [core]
    environment:
      EEPER_DATABASE_URL: postgresql+asyncpg://eeper:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run deploy/install.sh}@db:5432/eeper
      EEPER_SECRET_KEY: ${EEPER_SECRET_KEY:?EEPER_SECRET_KEY is required — run deploy/install.sh}
      # Internal media gateway (only present with the `video` profile).
      EEPER_GO2RTC_URL: http://go2rtc:1984
      # Web Push (M2.4). Empty is tolerated (push disabled, nudges still land in the
      # Tonight view); install.sh generates a VAPID keypair.
      EEPER_VAPID_PUBLIC_KEY: ${EEPER_VAPID_PUBLIC_KEY:-}
      EEPER_VAPID_PRIVATE_KEY: ${EEPER_VAPID_PRIVATE_KEY:-}
      EEPER_VAPID_SUBJECT: ${EEPER_VAPID_SUBJECT:-mailto:admin@localhost}
    tmpfs:
      - /tmp
    # The shared media volume: the recorder writes segments here; the api reads
    # them and writes promoted clips under /media/clips. Writable under the
    # read-only rootfs because it's a mounted named volume.
    volumes:
      - media-data:/media
    networks: [edge, internal]
    depends_on:
      db:
        condition: service_healthy

  web:
    <<: *hardening
    build:
      context: ../web
    image: eeper-web:dev
    profiles: [core]
    tmpfs:
      - /tmp:mode=1777
    networks: [edge]

  # Media gateway (video profile). Third-party image, pinned by digest and tracked
  # by Renovate (like the db image). It lives on `edge` (not the isolated internal
  # net) because it must reach camera sources (LAN cameras in production).
  #
  # Only the WebRTC MEDIA port 8555 is published (M1.2) — browser media transport
  # can't traverse an HTTP proxy, so the client must reach it directly. It's bound
  # to EEPER_GO2RTC_CANDIDATE (127.0.0.1 for local/CI; the host LAN IP in prod), not
  # 0.0.0.0. Signaling (:1984) and RTSP (:8554) stay UNPUBLISHED — the api relays
  # WebRTC signaling behind auth, and nothing reaches go2rtc's control planes.
  go2rtc:
    <<: *hardening
    image: alexxit/go2rtc:latest@sha256:675c318b23c06fd862a61d262240c9a63436b4050d177ffc68a32710d9e05bae
    profiles: [video]
    user: '10001:10001'
    # Seed the config onto a writable tmpfs so go2rtc runs non-root + read-only and
    # can cleanly persist streams the api registers at runtime.
    command:
      [
        'sh',
        '-c',
        'cp /seed/go2rtc.yaml /config/go2rtc.yaml && exec go2rtc -config /config/go2rtc.yaml',
      ]
    environment:
      # The host address the browser reaches go2rtc's media port on. Expanded into
      # webrtc.candidates in go2rtc.yaml.
      EEPER_GO2RTC_CANDIDATE: ${EEPER_GO2RTC_CANDIDATE:-127.0.0.1}
    ports:
      - '${EEPER_GO2RTC_CANDIDATE:-127.0.0.1}:8555:8555/udp'
      - '${EEPER_GO2RTC_CANDIDATE:-127.0.0.1}:8555:8555/tcp'
    volumes:
      - ./go2rtc/go2rtc.yaml:/seed/go2rtc.yaml:ro
    tmpfs:
      - /config:mode=1777
      - /tmp:mode=1777
    networks: [edge]
    healthcheck:
      # Gate readiness on the REST API the api registers streams against, so
      # `up --wait` (and callers) don't race a not-yet-listening gateway.
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:1984/api/streams']
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Segment recorder (M1.4, `record` profile). Reuses the api image (same ffmpeg +
  # eeper package) with a different command, so it's covered by the api's Trivy
  # scan — no extra image. A dedicated container (not an api task) for crash
  # isolation: the crash-safety test SIGKILLs it, which must not touch the api/db.
  # It records each enabled camera from go2rtc's internal RTSP and evicts oldest
  # segments over the quota. Needs `edge` (reach go2rtc) + `internal` (reach db).
  recorder:
    <<: *hardening
    build:
      context: ../server
    image: eeper-api:dev
    profiles: [record]
    user: '10001:10001'
    # tini as PID 1 forwards SIGTERM to the Python process (which runs as the
    # container's PID 1 otherwise, where the default SIG_DFL disposition is ignored)
    # so `docker stop` triggers the supervisor's graceful ffmpeg SIGTERM->KILL
    # teardown instead of waiting the grace period then SIGKILL.
    init: true
    command: ['python', '-m', 'eeper.recorder']
    # The recorder reuses the api image but runs no HTTP server, so drop the
    # image's HTTP healthcheck (it would never pass).
    healthcheck:
      disable: true
    environment:
      EEPER_DATABASE_URL: postgresql+asyncpg://eeper:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run deploy/install.sh}@db:5432/eeper
      # Not used by the recorder, but Settings requires it to load.
      EEPER_SECRET_KEY: ${EEPER_SECRET_KEY:?EEPER_SECRET_KEY is required — run deploy/install.sh}
      EEPER_GO2RTC_RTSP_URL: rtsp://go2rtc:8554
    volumes:
      - media-data:/media
    tmpfs:
      - /tmp
    networks: [edge, internal]
    depends_on:
      db:
        condition: service_healthy

  # Insight engine (M2.1, `insight` profile). Reuses the api image with a command
  # override, like the recorder. M2.1 stage = audio extraction: one ffmpeg
  # audio-decode child per enabled camera pulling go2rtc's RTSP re-serve, producing
  # 16 kHz mono PCM windows in-process (M2.2 builds the frame sampler / features /
  # MQTT on top). No HTTP server (drop the image's healthcheck).
  insight:
    <<: *hardening
    build:
      context: ../server
    image: eeper-api:dev
    profiles: [insight]
    user: '10001:10001'
    # tini forwards SIGTERM so `docker stop` runs the supervisor's graceful teardown
    # (ffmpeg SIGTERM->KILL + MQTT disconnect) rather than SIGKILL after the grace
    # period — see the recorder note above.
    init: true
    command: ['python', '-m', 'eeper.insight']
    healthcheck:
      disable: true
    environment:
      EEPER_DATABASE_URL: postgresql+asyncpg://eeper:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run deploy/install.sh}@db:5432/eeper
      # Not used by the insight engine, but Settings requires it to load.
      EEPER_SECRET_KEY: ${EEPER_SECRET_KEY:?EEPER_SECRET_KEY is required — run deploy/install.sh}
      EEPER_GO2RTC_RTSP_URL: rtsp://go2rtc:8554
      # Movement-level events + motion samples publish to the internal MQTT broker.
      EEPER_MQTT_HOST: mqtt
      EEPER_MQTT_PORT: '1883'
    tmpfs:
      - /tmp
    networks: [edge, internal]
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy

  # Internal MQTT broker (M2.2): the insight-engine publishes movement-level events
  # + motion samples here; later, sensor nodes join it (M3.1 hardens it with TLS +
  # per-device ACLs). No host port — reachable only by services on `internal`.
  mqtt:
    <<: *hardening
    image: eclipse-mosquitto:2.0.22@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
    profiles: [insight]
    user: '1883:1883'
    command: ['mosquitto', '-c', '/mosquitto/config/mosquitto.conf']
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    tmpfs:
      - /mosquitto/data
      - /mosquitto/log
    networks: [internal]
    healthcheck:
      # Liveness = can connect + publish. Exec form (no shell) sidesteps $SYS/quote
      # pitfalls; the message goes nowhere (no subscribers).
      test: ['CMD', 'mosquitto_pub', '-h', '127.0.0.1', '-t', 'healthcheck', '-m', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    <<: *hardening
    build:
      context: ./caddy
    image: eeper-caddy:dev
    profiles: [core]
    # The only service that publishes ports. Host 80/443 map onto Caddy's
    # unprivileged 8080/8443 so it needs no capabilities at all.
    ports:
      - '${EEPER_BIND_ADDR:-0.0.0.0}:${EEPER_HTTP_PORT:-80}:8080'
      - '${EEPER_BIND_ADDR:-0.0.0.0}:${EEPER_HTTPS_PORT:-443}:8443'
    environment:
      EEPER_DOMAIN: ${EEPER_DOMAIN:-localhost}
      # The externally published HTTPS port, so the HTTP→HTTPS redirect targets it.
      EEPER_HTTPS_PORT: ${EEPER_HTTPS_PORT:-443}
    volumes:
      - caddy-data:/data # persists the local CA + issued certs across restarts
    tmpfs:
      - /tmp:mode=1777
    networks: [edge]
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  db-data:
  caddy-data:
  media-data: # recording segments + promoted clips (shared by recorder + api)

networks:
  edge:
  internal:
    internal: true # no route to the host or the internet; db lives here
