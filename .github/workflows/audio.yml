name: audio

# M2.3 audio nudges. Two CI-only gates (no stack):
#   * quality-gate — the sound-level product contract + the cry-classifier window
#     ratchet baselines, over the frozen fixtures-v1 eval split (crit 2). Runs in the
#     same digest-pinned base image the fixtures build uses, so the audio backend
#     (numpy/scipy/soundfile/onnxruntime/pyroomacoustics) is fixed and the ratchet is
#     deterministic.
#   * onnx-smoke — the ONNX Runtime CPU inference path on amd64 AND arm64 (crit 4).
on:
  pull_request:
    paths: ['models/**', 'server/eeper/insight/**', 'fixtures/**', '.github/workflows/audio.yml']
  push:
    branches: [main]
    paths: ['models/**', 'server/eeper/insight/**', 'fixtures/**', '.github/workflows/audio.yml']

permissions:
  contents: read

concurrency:
  group: audio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Audio-nudge quality gate (sound-level contract + cry ratchets)
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim@sha256:423ed6ab25b1921a477529254bfeeabf5855151dc2c3141699a1bfc852199fbf
    steps:
      - name: Install audio backend + git (pinned by the base-image digest)
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git libsndfile1
      - uses: actions/checkout@v4

      # Content-addressed clip cache (checksummed) keyed on the manifest — first run
      # fetches the eval clips, later runs reuse them (and go easy on rate-limited
      # public mirrors).
      - name: Cache fetched fixture clips
        uses: actions/cache@v4
        with:
          path: /tmp/cryeval-cache
          key: cryeval-clips-${{ hashFiles('fixtures/manifest.json', 'models/manifest.json') }}

      # Pinned deps so the deterministic gate + ratchets do not drift across runs.
      - name: Install pinned deps
        run: |
          pip install --no-cache-dir "numpy==1.26.4" "onnxruntime==1.19.2" \
            "scipy==1.14.1" "soundfile==0.12.1" "pyroomacoustics==0.10.1"

      # Crit 2: sound-level episode recall / latency / false-events (product contract)
      # and the cry window ratchet baselines, on the frozen eval split. Deterministic
      # (fixed seeds; PYTHONHASHSEED pinned as a belt-and-suspenders).
      - name: Quality gate
        env:
          PYTHONHASHSEED: '0'
        run: python models/cryeval.py gate --cache /tmp/cryeval-cache

  onnx-smoke:
    name: ONNX Runtime CPU smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      # Crit 4: the split model (eeper NumPy frontend -> checksum-verified YAMNet ONNX)
      # runs on the CPU execution provider on BOTH release arches. The Pi target is
      # arm64, so onnxruntime must have a working arm64 wheel + kernels.
      - name: Frontend + ONNX inference smoke
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v "$PWD:/repo:ro" \
            python:3.12-slim bash -c '
              pip install -q "numpy<2" onnxruntime &&
              python - <<PY
          import sys
          from pathlib import Path

          sys.path.insert(0, "/repo/server")
          import numpy as np

          from eeper.insight import cry, frontend
          from eeper.insight.modelfetch import ensure_models

          onnx = ensure_models(Path("/repo/models/manifest.json"), Path("/tmp/m"))["yamnet-classifier"]
          clf = cry.CryClassifier(str(onnx))
          wav = (0.1 * np.random.default_rng(0).standard_normal(32000)).astype("float32")
          patches = frontend.log_mel_patches(wav)
          assert patches.shape[1:] == (96, 64), patches.shape
          score = clf.score_waveform(wav)
          assert isinstance(score, float) and score == score, score  # finite
          print("ONNX CPU smoke OK:", patches.shape, "score", round(score, 5))
          PY'
