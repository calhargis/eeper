name: harness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: Test-harness self-test (synthetic camera + sensor fleet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install "paho-mqtt>=2.1,<3.0" "pytest>=8.0,<9.0"

      # Bring up the synthetic inputs and assert both are reachable/publishing.
      - name: Bring up the harness
        run: docker compose -f deploy/harness/docker-compose.yml up -d --build

      - name: Run harness self-test
        run: pytest deploy/harness/tests -v

      - name: Dump harness logs on failure
        if: failure()
        run: docker compose -f deploy/harness/docker-compose.yml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose -f deploy/harness/docker-compose.yml down -v
