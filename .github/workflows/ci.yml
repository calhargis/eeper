name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: these jobs only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to lint a commit range
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Lint PR commit range
        if: github.event_name == 'pull_request'
        run: >
          npx commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose
      - name: Lint pushed commit
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

  format:
    name: Prettier (format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx prettier --check .

  python:
    name: Python (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: ruff (lint)
        run: ruff check --output-format=github .
      - name: ruff (format check)
        run: ruff format --check .
      - name: mypy (strict)
        run: mypy .
      - name: pytest
        run: pytest

  copy-lint:
    name: Clinical-terms copy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Enforces the safety boundary in CI: user-facing copy must make no medical /
      # diagnostic / vital-sign / alarm claims (CONTRIBUTING.md). Pure stdlib, no install.
      - name: Clinical-terms lint
        run: python server/scripts/clinical_terms_lint.py

  web:
    name: Web (eslint, svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: eslint
        run: npm run lint
      - name: svelte-check (TypeScript)
        run: npm run check

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    # M5.1: fail on any real credential committed to the repo (full git history). The
    # allowlist in .gitleaks.toml covers ONLY known-dummy test fixtures + *.example
    # templates; real generated secrets are git-ignored and never committed.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan full history, not just the tip
      - name: gitleaks detect
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --config=/repo/.gitleaks.toml --no-banner --redact

  dependency-audit:
    name: Dependency audit (pip-audit + npm audit)
    runs-on: ubuntu-latest
    # M5.1: audit the SHIPPED dependency trees for known advisories. Scope is runtime-only
    # — the image build tooling (pip/setuptools) and dev/test deps (pytest, ruff, mypy) are
    # not shipped; the runtime container itself is CVE-scanned by Trivy in images.yml.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip-audit (server runtime deps)
        run: |
          python -m venv /tmp/rt
          /tmp/rt/bin/pip install --upgrade pip >/dev/null
          /tmp/rt/bin/pip install ./server >/dev/null
          # Freeze the runtime closure (pip freeze omits pip/setuptools/wheel); drop the
          # local project itself (not on PyPI) so --strict has nothing unauditable.
          /tmp/rt/bin/pip freeze | grep -viE '^eeper( |==|@)' > /tmp/runtime-reqs.txt
          pip install pip-audit
          pip-audit --strict -r /tmp/runtime-reqs.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm audit (web prod deps)
        working-directory: web
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
