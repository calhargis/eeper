name: stack

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: stack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Core stack integration (install.sh + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install "httpx>=0.27,<1.0" "pytest>=8.0,<9.0"

      # This is the M0.2 criterion under test: a clean-host install produces a
      # running, secure stack. install.sh generates secrets, builds, brings the
      # core stack up, and extracts the local CA.
      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Run integration tests
        run: pytest deploy/tests/test_stack.py -v

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  sensors:
    name: Sensor onboarding (MQTT pairing + ingestion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install "httpx>=0.27,<1.0" "pytest>=8.0,<9.0"

      # install.sh generates the MQTT CA + credentials + dynsec seed and brings up the
      # core stack — which now includes the hardened broker (M3.1). The suite then pairs
      # a device over the API and publishes as it from inside the broker container.
      - name: Bring up the core stack (install.sh + hardened MQTT)
        working-directory: deploy
        run: ./install.sh

      - name: Run sensor onboarding tests
        run: pytest deploy/tests/sensors/test_sensors.py -v

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  video:
    name: Media gateway integration (M1.1)
    runs-on: ubuntu-latest
    # Pin the go2rtc media bind + advertised ICE candidate to loopback (install.sh
    # would otherwise auto-detect the runner's routable LAN IP).
    env:
      EEPER_GO2RTC_CANDIDATE: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install "httpx>=0.27,<1.0" "pytest>=8.0,<9.0" "aiortc>=1.9,<2.0"

      # Core + go2rtc (video profile) + a synthetic camera on the shared network.
      - name: Bring up the core + video stack
        working-directory: deploy
        run: |
          ./install.sh
          docker compose -f docker-compose.yml -f video-test.yml \
            --profile core --profile video up -d --build --wait

      # Only the M1.1 gateway tests here; the adapter suite (test_usb_adapter.py)
      # needs the adapter overlay and runs in the `adapters-usb` job.
      - name: Run media-gateway tests
        run: pytest deploy/tests/video/test_cameras.py -v

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml --profile core --profile video logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml --profile core --profile video down -v

  e2e:
    name: Browser harness (Playwright wizard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Fresh core stack (no admin yet) so the app opens on the first-boot wizard.
      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Run browser harness (first-boot wizard)
        working-directory: web
        run: npx playwright test --project=wizard

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-wizard
          path: web/playwright-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  e2e-devices:
    name: Devices view (Playwright MQTT onboarding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Fresh core stack (db + api + hardened MQTT broker). The suite pairs a node
      # through the UI, then publishes AS it from inside the broker container.
      - name: Bring up the core stack (install.sh + hardened MQTT)
        working-directory: deploy
        run: ./install.sh

      - name: Run Devices view harness
        working-directory: web
        run: npx playwright test --project=devices

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-devices
          path: web/playwright-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  e2e-trends:
    name: Trends view (Playwright charts + CSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Fresh core stack — the db is TimescaleDB, so the trends_nightly continuous
      # aggregate exists. The suite seeds a month of sleep_sessions via psql, then
      # asserts the charts render and CSV export is admin-gated.
      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Run Trends view harness
        working-directory: web
        run: npx playwright test --project=trends

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-trends
          path: web/playwright-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  backup-restore:
    name: Backup/restore round-trip
    runs-on: ubuntu-latest
    # Prove the M4.3 [AUTO] criterion end to end: seed a stack → back up → destroy the
    # volumes → restore into a fresh stack → the DB digest + media checksum are identical.
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Seed database + media, capture pre-backup digests
        working-directory: deploy
        run: |
          set -euo pipefail
          PGPW=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
          dxe() { docker compose exec -T -e PGPASSWORD="$PGPW" db psql -U eeper -d eeper "$@"; }
          # Rows across a hypertable feeding the continuous aggregate, plus pulse-ox.
          dxe -c "INSERT INTO sleep_sessions (started_at, household_id, ended_at, total_sleep_s, wake_count, longest_stretch_s)
                  SELECT d, 'default', d + interval '8 hours', 28800, 1, 14400
                  FROM generate_series(now() - interval '40 days', now() - interval '1 day', interval '1 day') d;"
          dxe -c "INSERT INTO pulseox_readings (ts, household_id, device_id, hr, spo2, perfusion, quality)
                  SELECT g, 'default', 1, 120, 98, 4, 0.9 FROM generate_series(now() - interval '2 days', now(), interval '1 hour') g;"
          dxe -c "CALL refresh_continuous_aggregate('trends_nightly', NULL, NULL);"
          # A known media file (a stand-in promoted clip).
          docker run --rm -v eeper_media-data:/media alpine sh -c "mkdir -p /media/clips && echo eeper-backup-roundtrip > /media/clips/ci.bin"
          # Digests to compare after the restore.
          dxe -tAc "SELECT count(*)||'|'||coalesce(round(sum(total_sleep_s)),0)||'|'||(SELECT count(*) FROM pulseox_readings)||'|'||(SELECT count(*) FROM trends_nightly) FROM sleep_sessions" | tr -d '[:space:]' > /tmp/dig.before
          docker run --rm -v eeper_media-data:/media alpine sha256sum /media/clips/ci.bin | awk '{print $1}' > /tmp/media.before
          echo "digest=$(cat /tmp/dig.before)  media=$(cat /tmp/media.before)"

      - name: Back up
        working-directory: deploy
        run: ./backup.sh backups/ci

      - name: Destroy the stack (volumes included)
        working-directory: deploy
        run: docker compose --profile core down -v

      - name: Restore into a fresh stack
        working-directory: deploy
        run: ./restore.sh backups/ci

      - name: Verify data + media are byte-identical
        working-directory: deploy
        run: |
          set -euo pipefail
          PGPW=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
          dxe() { docker compose exec -T -e PGPASSWORD="$PGPW" db psql -U eeper -d eeper "$@"; }
          dxe -tAc "SELECT count(*)||'|'||coalesce(round(sum(total_sleep_s)),0)||'|'||(SELECT count(*) FROM pulseox_readings)||'|'||(SELECT count(*) FROM trends_nightly) FROM sleep_sessions" | tr -d '[:space:]' > /tmp/dig.after
          docker run --rm -v eeper_media-data:/media alpine sha256sum /media/clips/ci.bin | awk '{print $1}' > /tmp/media.after
          echo "before: $(cat /tmp/dig.before) / $(cat /tmp/media.before)"
          echo "after:  $(cat /tmp/dig.after) / $(cat /tmp/media.after)"
          diff /tmp/dig.before /tmp/dig.after
          diff /tmp/media.before /tmp/media.after
          echo "round-trip OK — database + media identical"

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  bench-smoke:
    name: Bench harness smoke (measurement + stability)
    runs-on: ubuntu-latest
    # M5.2: validate the reference-profile bench HARNESS on a shared runner — it measures
    # CPU/latency and confirms no container restarts/OOM over a short window. The real
    # reference-profile gate (Pi 5, < 60% CPU, 72 h) runs on the self-hosted bench runner
    # via .github/workflows/bench.yml; a GitHub runner is not a Pi, so budgets are relaxed.
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh
      - name: Run the bench harness (smoke)
        run: python3 scripts/bench.py --smoke --duration 45 --interval 5 | tee bench-report.json
      - name: Upload bench report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-smoke
          path: bench-report.json
          retention-days: 7
      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color
      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  e2e-pulseox:
    name: Pulse-ox view (Playwright trend + caveat)
    runs-on: ubuntu-latest
    # Turn the optional pulse-ox profile ON for the api. Compose interpolates this from
    # the environment, so install.sh's `up` brings the api up with the profile enabled —
    # the first half of the pulse-ox gate. The suite acknowledges the disclaimer (the
    # second half) through the UI, then asserts the trend view + the caveat on every view.
    env:
      EEPER_PULSEOX_PROFILE_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Run Pulse-ox view harness
        working-directory: web
        run: npx playwright test --project=pulseox

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pulseox
          path: web/playwright-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  e2e-roles:
    name: Role sweep (viewer grandparent mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      - name: Run role-sweep harness
        working-directory: web
        run: npx playwright test --project=roles

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-roles
          path: web/playwright-report/
          retention-days: 7

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose --profile core logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  e2e-live:
    name: Live view (Playwright WebRTC)
    runs-on: ubuntu-latest
    # Pin the go2rtc media bind + advertised ICE candidate to loopback, which the
    # runner's headless Chromium can always reach. Without this install.sh would
    # auto-detect the runner's routable LAN IP (its `ip route` src), which happens
    # to work but isn't what we want to depend on.
    env:
      EEPER_GO2RTC_CANDIDATE: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Core + go2rtc (video profile) + synthetic camera. EEPER_GO2RTC_CANDIDATE
      # is pinned to 127.0.0.1 (job env), so the published media port + advertised
      # ICE candidate both land on loopback the runner's browser can reach.
      - name: Bring up the core + video stack
        working-directory: deploy
        run: |
          ./install.sh
          docker compose -f docker-compose.yml -f video-test.yml \
            --profile core --profile video up -d --build --wait

      # Provisions admin + viewer + a registered camera, then asserts the M1.2
      # criteria: frames flow within 3s, playout latency in budget, unauth
      # redirect, and viewer-role access.
      - name: Run Live view harness
        working-directory: web
        run: npx playwright test --project=live

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live
          path: web/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml --profile core --profile video logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml --profile core --profile video down -v

  adapters-usb:
    name: USB adapter (V4L2) contract + browser
    runs-on: ubuntu-latest
    env:
      EEPER_GO2RTC_CANDIDATE: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install test dependencies
        run: |
          python -m pip install "httpx>=0.27,<1.0" "pytest>=8.0,<9.0" "aiortc>=1.9,<2.0"
          (cd web && npm ci)
          (cd web && npx playwright install --with-deps chromium)

      # Core + go2rtc + the USB adapter (synthetic lavfi input — the SAME encode +
      # serve path a real webcam takes; hosted runners can't load v4l2loopback, so
      # the real device open is the [MANUAL] bench — see docs/ci.md).
      - name: Bring up the core + video + adapter stack
        working-directory: deploy
        run: |
          ./install.sh
          docker compose -f docker-compose.yml -f video-test.yml -f adapter-test.yml \
            --profile core --profile video up -d --build --wait

      # Contract: the adapter stream registers (H.264/<=1080p), re-serves H.264,
      # answers WebRTC, and the container is hardened.
      - name: Adapter contract suite
        run: pytest deploy/tests/video/test_usb_adapter.py -v

      # End-to-end: the adapter's stream plays in the browser harness (same suite
      # native cameras pass). EEPER_TEST_ADMIN=admin reuses the admin the contract
      # suite created, avoiding a first-boot clash.
      - name: Adapter browser harness
        working-directory: web
        env:
          EEPER_TEST_SOURCE: rtsp://usb-adapter:8554/cam
          EEPER_TEST_ADMIN: admin
        run: npx playwright test --project=live

      # Best-effort ONLY: exercise a real V4L2 capture if this runner happens to
      # permit loading v4l2loopback (hosted runners don't — kernel lockdown). Never
      # red-gates: every risky step is guarded, and the whole step is non-blocking.
      - name: (best-effort) real V4L2 loopback capture
        continue-on-error: true
        run: |
          sudo apt-get update || exit 0
          sudo apt-get install -y v4l2loopback-dkms "linux-headers-$(uname -r)" ffmpeg || exit 0
          sudo modprobe v4l2loopback video_nr=10 exclusive_caps=1 card_label=eeper || exit 0
          ffmpeg -re -stream_loop -1 -f lavfi -i testsrc2=size=1280x720:rate=15 \
            -c:v mjpeg -f v4l2 /dev/video10 & sleep 4
          gid=$(stat -c %g /dev/video10)
          docker run -d --name usb-real --device /dev/video10 --group-add "$gid" \
            -e V4L2_DEVICE=/dev/video10 -p 127.0.0.1:8560:8554 \
            --read-only --tmpfs /tmp --cap-drop ALL --security-opt no-new-privileges \
            eeper-usb-adapter:dev || exit 0
          sleep 6
          docker run --rm --network host --entrypoint ffprobe eeper-usb-adapter:dev \
            -v error -rtsp_transport tcp -select_streams v:0 \
            -show_entries stream=codec_name -of csv=p=0 rtsp://127.0.0.1:8560/cam \
            | grep -q h264 && echo "real V4L2 capture -> H.264 OK"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-adapter
          path: web/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml -f adapter-test.yml --profile core --profile video logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml -f adapter-test.yml --profile core --profile video down -v

  lighthouse:
    name: PWA (Lighthouse installability + budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Pinned to the 0.13 line (Lighthouse 11): it still ships the PWA
      # installability audits that Lighthouse 12 removed.
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      # Core stack is enough for the installable app shell (the sign-in landing).
      - name: Bring up the core stack (install.sh)
        working-directory: deploy
        run: ./install.sh

      # Trust the local CA in the NSS DB Chrome uses, so the origin is a genuine
      # secure context (installability depends on it) — not --ignore-certificate-errors.
      - name: Trust the local CA
        run: |
          sudo apt-get update && sudo apt-get install -y libnss3-tools
          mkdir -p "$HOME/.pki/nssdb"
          certutil -d sql:"$HOME/.pki/nssdb" -A -n eeper-local-ca -t "C,," \
            -i deploy/eeper-local-ca.crt

      - name: Run Lighthouse CI
        working-directory: web
        run: lhci autorun --config=lighthouserc.json

      - name: Upload Lighthouse report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: web/.lighthouseci/
          retention-days: 7

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose --profile core down -v

  recorder:
    name: Recorder + audio + motion pipeline
    runs-on: ubuntu-latest
    env:
      EEPER_GO2RTC_CANDIDATE: 127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install test dependencies
        run: |
          python -m pip install "httpx>=0.27,<1.0" "pytest>=8.0,<9.0"
          (cd web && npm ci)
          # Clip playback needs H.264 decode -> real Chrome, not bundled Chromium.
          (cd web && npx playwright install --with-deps chrome)

      # Core + go2rtc + synthetic camera + the recorder + the insight engine (audio
      # extraction). Fast test settings via the -test overlays.
      - name: Bring up the core + video + record + insight stack
        working-directory: deploy
        run: |
          ./install.sh
          # Wait on the health-gated core+video services, then start the recorder +
          # insight without --wait (no HTTP healthcheck; the tests poll for output).
          # All profiles are named so their depends_on resolves.
          docker compose -f docker-compose.yml -f video-test.yml -f recorder-test.yml -f insight-test.yml \
            --profile core --profile video up -d --build --wait
          docker compose -f docker-compose.yml -f video-test.yml -f recorder-test.yml -f insight-test.yml \
            --profile core --profile video --profile record --profile insight up -d recorder insight

      # Criteria 1-4: segments written, crash safety (SIGKILL loses at most the
      # active segment), clip promotion (duration-matching playable H.264 + Range
      # auth), eviction keeps promoted clips; plus the Starlette CVE floor.
      - name: Recorder integration suite
        run: pytest deploy/tests/video/test_recorder.py -v

      # M2.1 criterion 1: the insight engine extracts the synthetic camera's audio
      # to 16 kHz mono PCM windows that verify as the expected 1 kHz tone.
      - name: Audio pipeline suite
        run: pytest deploy/tests/audio/test_audio_pipeline.py -v

      # Criterion 3 (real browser): a promoted clip decodes + plays in system Chrome.
      - name: Clip playback harness
        working-directory: web
        env:
          EEPER_TEST_ADMIN: admin
        run: npx playwright test --project=clips

      # M2.4 (web): the Tonight view shows a live nudge over WebSocket and its
      # auto-promoted clip plays on tap. first-boot is single-admin and single-shot,
      # so this reuses the admin the clip harness already created (same pattern as the
      # USB adapter browser harness) — a fresh username would 409 on first-boot and
      # then fail to log in as an account that was never created.
      - name: Tonight view harness
        working-directory: web
        env:
          EEPER_TEST_ADMIN: admin
        run: npx playwright test --project=tonight

      # M3.3 slice 3: the Tonight timeline renders a replayed night (seeded fused_states)
      # and scrubbing to a nudge marker plays its clip. Reuses the admin + promoted clip
      # the tonight harness just produced on this same stack.
      - name: Tonight timeline harness
        working-directory: web
        env:
          EEPER_TEST_ADMIN: admin
        run: npx playwright test --project=timeline

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-clips
          path: web/playwright-report/
          retention-days: 7

      # M2.2 C3 + C5: a motion onset on the synthetic cam-motion source produces a
      # movement-level event on MQTT + a state_history row within 2s; a video-only
      # source runs with the motion extractor only. (MQTT is read inside the broker
      # container + state_history inside db — the broker has no host port.)
      - name: Motion pipeline suite
        run: pytest deploy/tests/insight/test_motion_pipeline.py -v

      # M2.3 crit 3: a sustained sound on the synthetic cam-sound source produces a
      # sound_elevated event on MQTT + a state_history row end-to-end.
      - name: Sound pipeline suite
        run: pytest deploy/tests/insight/test_sound_pipeline.py -v

      # M2.4: the sound_elevated nudge auto-promotes a pre/post-roll clip (the api-side
      # worker), the events API returns it, and the clip is playable.
      - name: Nudge pipeline suite (auto-clip)
        run: pytest deploy/tests/insight/test_nudge_pipeline.py -v

      # M2.2 C4: slow the scorer (overlay) and confirm frames are DROPPED not queued
      # — freshness < 3s, fed >> scored. Recreate only the insight service.
      - name: Slow the scorer for the backpressure check
        working-directory: deploy
        run: >
          docker compose -f docker-compose.yml -f video-test.yml -f recorder-test.yml
          -f insight-test.yml -f insight-motion-test.yml
          --profile core --profile video --profile record --profile insight
          up -d --force-recreate insight

      - name: Motion backpressure suite
        run: pytest deploy/tests/insight/test_backpressure.py -v

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml -f recorder-test.yml -f insight-test.yml -f insight-motion-test.yml --profile core --profile video --profile record --profile insight logs --no-color

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose -f docker-compose.yml -f video-test.yml -f recorder-test.yml -f insight-test.yml -f insight-motion-test.yml --profile core --profile video --profile record --profile insight down -v
