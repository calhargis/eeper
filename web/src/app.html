<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="eeper" />
    <script>
      // Apply the saved theme (lib/theme.ts) before first paint — no flash of the
      // default palette. A theme is just base color vars + a mode; app.css derives the
      // rest. Mirrors applyTheme(); kept tiny and dependency-free.
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('eeper-theme'));
          if (t && t.vars && t.mode) {
            var r = document.documentElement;
            r.setAttribute('data-theme', t.mode);
            for (var k in t.vars) r.style.setProperty('--' + k, t.vars[k]);
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', t.vars.bg);
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      // Register the precache service worker (generated by @vite-pwa). Kept inline
      // and simple; installability + offline shell depend on it.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
